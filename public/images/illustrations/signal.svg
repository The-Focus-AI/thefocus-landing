<svg viewBox="0 0 500 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="signalFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1B4D5C" stop-opacity="0.2"/>
      <stop offset="12%" stop-color="#1B4D5C" stop-opacity="1"/>
      <stop offset="88%" stop-color="#1B4D5C" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1B4D5C" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10"/>
    </filter>
  </defs>

  <style>
    /* --- Noise lines: draw in, then fade --- */
    .noise {
      stroke-dasharray: 1200;
      stroke-dashoffset: 1200;
    }
    .noise-1  { animation: drawNoise 1.2s ease-out 0.1s forwards, fadeNoise 1.2s ease-in 1.6s forwards; }
    .noise-2  { animation: drawNoise 1.0s ease-out 0.2s forwards, fadeNoise 1.2s ease-in 1.8s forwards; }
    .noise-3  { animation: drawNoise 1.3s ease-out 0.05s forwards, fadeNoise 1.2s ease-in 1.5s forwards; }
    .noise-4  { animation: drawNoise 1.1s ease-out 0.25s forwards, fadeNoise 1.2s ease-in 1.9s forwards; }
    .noise-5  { animation: drawNoise 1.0s ease-out 0.3s forwards, fadeNoise 1.2s ease-in 1.7s forwards; }
    .noise-6  { animation: drawNoise 1.2s ease-out 0.15s forwards, fadeNoise 1.2s ease-in 2.0s forwards; }
    .noise-7  { animation: drawNoise 0.9s ease-out 0.35s forwards, fadeNoise 1.2s ease-in 1.65s forwards; }
    .noise-8  { animation: drawNoise 1.1s ease-out 0.1s forwards, fadeNoise 1.2s ease-in 1.85s forwards; }
    .noise-9  { animation: drawNoise 1.0s ease-out 0.2s forwards, fadeNoise 1.2s ease-in 1.75s forwards; }
    .noise-10 { animation: drawNoise 1.15s ease-out 0.28s forwards, fadeNoise 1.2s ease-in 1.95s forwards; }

    /* --- Clean signal: appears and draws --- */
    .signal-line {
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      opacity: 0;
      animation: appear 0.01s linear 2.4s forwards, drawSignal 1.8s ease-in-out 2.4s forwards;
    }
    .signal-glow-line {
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      opacity: 0;
      animation: appear 0.01s linear 2.3s forwards, drawSignal 2s ease-in-out 2.3s forwards;
    }

    /* --- Accent dots at peaks/troughs --- */
    .dot {
      opacity: 0;
      transform-origin: center;
    }
    .dot-1 { animation: dotIn 0.5s ease-out 3.6s forwards, dotFloat 4s ease-in-out 4.1s infinite; }
    .dot-2 { animation: dotIn 0.5s ease-out 3.8s forwards, dotFloat 4.5s ease-in-out 4.3s infinite; }
    .dot-3 { animation: dotIn 0.5s ease-out 4.0s forwards, dotFloat 3.8s ease-in-out 4.5s infinite; }
    .dot-4 { animation: dotIn 0.5s ease-out 4.2s forwards, dotFloat 4.2s ease-in-out 4.7s infinite; }
    .dot-5 { animation: dotIn 0.5s ease-out 4.4s forwards, dotFloat 3.5s ease-in-out 4.9s infinite; }

    /* --- Ambient particles --- */
    .ambient {
      opacity: 0;
    }
    .ambient-1 { animation: ambientIn 1.5s ease-out 0.2s forwards, ambientFloat 12s ease-in-out 1.7s infinite; }
    .ambient-2 { animation: ambientIn 1.5s ease-out 0.3s forwards, ambientFloat 14s ease-in-out 1.8s infinite; }
    .ambient-3 { animation: ambientIn 1.5s ease-out 0.25s forwards, ambientFloat 11s ease-in-out 1.75s infinite; }
    .ambient-4 { animation: ambientIn 1.5s ease-out 0.35s forwards, ambientFloat 15s ease-in-out 1.85s infinite; }
    .ambient-5 { animation: ambientIn 1.5s ease-out 0.4s forwards, ambientFloat 13s ease-in-out 1.9s infinite; }
    .ambient-6 { animation: ambientIn 1.5s ease-out 0.45s forwards, ambientFloat 16s ease-in-out 1.95s infinite; }
    .ambient-7 { animation: ambientIn 1.5s ease-out 0.5s forwards, ambientFloat 10s ease-in-out 2.0s infinite; }
    .ambient-8 { animation: ambientIn 1.5s ease-out 0.55s forwards, ambientFloat 11.5s ease-in-out 2.05s infinite; }

    /* --- Signal group breathes after completing --- */
    .signal-group {
      transform-origin: 250px 300px;
      animation: breathe 8s ease-in-out 5s infinite;
    }

    /* === Keyframes === */
    @keyframes drawNoise {
      to { stroke-dashoffset: 0; }
    }
    @keyframes fadeNoise {
      to { opacity: 0.07; }
    }
    @keyframes appear {
      to { opacity: 1; }
    }
    @keyframes drawSignal {
      to { stroke-dashoffset: 0; }
    }
    @keyframes dotIn {
      0%  { opacity: 0; transform: scale(0); }
      70% { opacity: 1; transform: scale(1.4); }
      100%{ opacity: 0.9; transform: scale(1); }
    }
    @keyframes dotFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-3px) scale(1.08); }
    }
    @keyframes ambientIn {
      0%  { opacity: 0; }
      100%{ opacity: 1; }
    }
    @keyframes ambientFloat {
      0%, 100% { transform: translateY(0) translateX(0); }
      33%      { transform: translateY(-5px) translateX(3px); }
      66%      { transform: translateY(-2px) translateX(-3px); }
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.012); }
    }
  </style>

  <!-- ========== Ambient particles (background) ========== -->
  <g class="ambient-particles">
    <circle class="ambient ambient-1" cx="430" cy="80"  r="14" fill="#D4795A" opacity="0.10"/>
    <circle class="ambient ambient-2" cx="65"  cy="130" r="10" fill="#D4795A" opacity="0.08"/>
    <circle class="ambient ambient-3" cx="460" cy="220" r="8"  fill="#1B4D5C" opacity="0.08"/>
    <circle class="ambient ambient-4" cx="30"  cy="380" r="7"  fill="#1B4D5C" opacity="0.10"/>
    <circle class="ambient ambient-5" cx="470" cy="420" r="6"  fill="#D4795A" opacity="0.07"/>
    <circle class="ambient ambient-6" cx="25"  cy="510" r="9"  fill="#1B4D5C" opacity="0.06"/>
    <circle class="ambient ambient-7" cx="450" cy="530" r="5"  fill="#A67B2C" opacity="0.08"/>
    <circle class="ambient ambient-8" cx="50"  cy="260" r="6"  fill="#D4795A" opacity="0.06"/>
  </g>

  <!-- ========== Noise lines ========== -->
  <g class="noise-layer">
    <!-- Upper noise  gentle drift -->
    <path class="noise noise-1"
      d="M10,160 Q60,120 120,180 Q180,240 230,150 Q280,60 340,170 Q400,280 450,140 Q480,80 500,160"
      stroke="#9E9E9E" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.5"/>

    <!-- Mid-upper  medium frequency -->
    <path class="noise noise-2"
      d="M0,230 Q50,280 100,210 Q150,140 210,270 Q270,400 320,230 Q370,60 420,240 Q470,420 500,220"
      stroke="#8B8B8B" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.4"/>

    <!-- Center area  sharp oscillation -->
    <path class="noise noise-3"
      d="M0,290 Q35,250 70,310 Q105,370 140,270 Q175,170 210,320 Q245,470 280,280 Q315,90 350,300 Q385,510 420,290 Q455,70 500,300"
      stroke="#A0A0A0" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.45"/>

    <!-- Center-left  crossing noise -->
    <path class="noise noise-4"
      d="M0,320 Q70,260 140,340 Q210,420 270,280 Q330,140 400,330 Q450,440 500,310"
      stroke="#7B7B7B" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.35"/>

    <!-- High-frequency thin noise -->
    <path class="noise noise-5"
      d="M20,270 Q40,240 60,280 Q80,320 100,260 Q120,200 140,290 Q160,380 180,270 Q200,160 220,285 Q240,410 260,275 Q280,140 300,280 Q320,420 340,265 Q360,110 380,280 Q400,450 420,270 Q440,90 470,280"
      stroke="#B0B0B0" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.4"/>

    <!-- Lower  slow wave -->
    <path class="noise noise-6"
      d="M0,400 Q80,350 160,420 Q240,490 320,380 Q400,270 480,410"
      stroke="#8B8B8B" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.35"/>

    <!-- Upper-right  brand-tinted noise -->
    <path class="noise noise-7"
      d="M10,190 Q90,240 170,170 Q250,100 330,210 Q410,320 490,180"
      stroke="#1B4D5C" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.15"/>

    <!-- Mid  brand-tinted noise (vermilion hint) -->
    <path class="noise noise-8"
      d="M0,340 Q60,290 130,360 Q200,430 270,310 Q340,190 410,350 Q460,440 500,330"
      stroke="#D4795A" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.12"/>

    <!-- Very low amplitude drift -->
    <path class="noise noise-9"
      d="M0,130 Q100,115 200,145 Q300,175 400,125 Q450,105 500,140"
      stroke="#9E9E9E" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.3"/>

    <!-- Lower drift -->
    <path class="noise noise-10"
      d="M10,470 Q90,440 170,480 Q250,520 330,460 Q410,400 490,470"
      stroke="#A0A0A0" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.25"/>
  </g>

  <!-- ========== Clean signal ========== -->
  <g class="signal-group">
    <!-- Soft glow behind signal -->
    <path class="signal-glow-line"
      d="M20,300 C65,240 115,240 160,300 C205,360 255,360 300,300 C345,240 395,240 440,300 C462,330 478,315 490,300"
      stroke="#1B4D5C" stroke-width="12" stroke-linecap="round" fill="none" filter="url(#softGlow)" opacity="0.3"/>

    <!-- Main signal line -->
    <path class="signal-line"
      d="M20,300 C65,240 115,240 160,300 C205,360 255,360 300,300 C345,240 395,240 440,300 C462,330 478,315 490,300"
      stroke="url(#signalFade)" stroke-width="3.5" stroke-linecap="round" fill="none"/>

    <!-- Accent dots at peaks and troughs -->
    <circle class="dot dot-1" cx="90"  cy="255" r="6" fill="#D4795A"/>
    <circle class="dot dot-2" cx="230" cy="345" r="7" fill="#D4795A"/>
    <circle class="dot dot-3" cx="370" cy="255" r="6" fill="#D4795A"/>
    <circle class="dot dot-4" cx="160" cy="300" r="4" fill="#1B4D5C"/>
    <circle class="dot dot-5" cx="300" cy="300" r="4" fill="#1B4D5C"/>
  </g>
</svg>
